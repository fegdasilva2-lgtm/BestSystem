name: CI

on:
  push:
    branches: [main, fase1-melhoria-layout]
  pull_request:
    branches: [main, fase1-melhoria-layout]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build design system
        run: npm run build:ds

      - name: Generate Supabase types (best-effort)
        # Falha silenciosa se o CLI nao estiver logado; o typecheck ainda
        # funciona contra o stub em packages/ds/src/db-types.ts.
        run: |
          if command -v supabase >/dev/null 2>&1; then
            npx supabase gen types typescript --local > packages/ds/src/db-types.ts 2>/dev/null || true
          fi
        continue-on-error: true

      - name: Typecheck (apps/web)
        run: cd apps/web && npm run typecheck

      - name: Lint (apps/web)
        run: cd apps/web && npm run lint || true

      - name: Run unit tests (inclui tests/rbac-matrix.test.mts = 392 assertions)
        run: npm run test

      - name: Build (apps/web)
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build

  # Os testes E2E (Playwright) rodam em job separado.
  # Sem env vars Supabase, todos os testes pulam (test.skip).
  # Para rodar de verdade, o caller precisa prover:
  #   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, E2E_TEST_TENANT_ID
  # (tipicamente via GitHub Actions secrets no repo).
  e2e:
    name: Playwright E2E (RBAC matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build design system
        run: npm run build:ds

      - name: Build apps/web (next build)
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build

      - name: Run E2E (Playwright)
        run: npx playwright test --reporter=junit
        env:
          BASE_URL: http://localhost:3000
          CI: "true"
          # Variaveis abaixo sao esperadas em producao para que o setup
          # global crie os 14 usuarios de teste. Sem elas, testes pulam.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_TENANT_ID: ${{ secrets.E2E_TEST_TENANT_ID }}
          PLAYWRIGHT_NO_WEBSERVER: "true"  # assume dev:web ja rodando

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7